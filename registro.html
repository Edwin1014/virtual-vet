<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <title>Registro - Virtual Vet</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="img/logo.png" alt="Virtual Vet">
    </div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="agendar.html">Agendar</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<main>
    <section class="formulario">

        <h1>Crear Cuenta</h1>
        <p id="mensaje-error" style="color:red; text-align:center;"></p>
        <form action="/registro" method="POST">

            <label>Nombre:</label>
            <input type="text" name="nombre" required>

            <label>Correo:</label>
            <input type="email" name="correo" required>

            <label>Contraseña:</label>
            <input type="password" name="password" required>

            <button type="submit">Registrarse</button>

        </form>

    </section>
</main>

<footer>
    <p>&copy; 2026 Virtual Vet</p>
</footer>
<script>

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    const mensaje = document.getElementById("mensaje-error");

    if(error === "correo"){
        mensaje.textContent = "Ese correo ya está registrado";
    }

</script>
<script src="js/app.js"></script>
</body>
</html>
