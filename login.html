<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <title>Iniciar Sesión - Virtual Vet</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="img/logo.png" alt="Virtual Vet">
    </div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="agendar.html">Agendar</a>
        <a href="login.html">Login</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<!-- LOGIN -->
<main>
    <section class="formulario">
        <h1>Iniciar Sesión</h1>
        <p id="mensaje-error" style="color:red; text-align:center;"></p>
        <form action="/login" method="POST">
            <label>Correo:</label>
            <input type="email" name="correo" placeholder="correo@email.com" required>

            <label>Contraseña:</label>
            <input type="password" name="password" required>

            <button type="submit">Ingresar</button>
        </form>

        <p>¿No tienes cuenta? <a href="registro.html">Registrarse</a></p>
    </section>
</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Virtual Vet</p>
</footer>

<script>

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    const mensaje = document.getElementById("mensaje-error");

    if(error === "usuario"){
        mensaje.textContent = "Usuario no encontrado";
    }

    if(error === "password"){
        mensaje.textContent = "Contraseña incorrecta";
    }

    if(error === "auth"){
    mensaje.textContent = "Debes iniciar sesión para agendar una cita";
    }

</script>
<script src="js/app.js"></script>
</body>
</html>
